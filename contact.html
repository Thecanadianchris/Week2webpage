<div class="section" id="contact">
    <h2>Contact Me</h2>
    <form onsubmit="handleSubmit(event)">

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>

        <div class="form-group">
            <label for="email" class="email-label">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label for="phone" class="phone-label">Phone number</label>
            <input type="tel" id="phone" name="phone" placeholder="+44 7700 000000">
        </div>

        <div class="form-group">
            <label for="message" >Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
        </div>

        <div class="form-group">
            <label>How would you like me to get back to you?</label>
            <div class="radio-group">
                <label class="radio-opt"><input type="radio" name="contact-pref" value="email"> Email</label>
                <label class="radio-opt"><input type="radio" name="contact-pref" value="call"> Call back</label>
                <label class="radio-opt"><input type="radio" name="contact-pref" value="text"> Text message</label>
            </div>
        </div>

        <button type="submit" class="submit-btn">Send message</button>
        <p class="success-msg" id="success-msg">✓ Message sent! I'll be in touch soon.</p>

    </form>
