<!-- Brand name -->
<text x="340" y="207" text-anchor="middle" font-size="36" style="fill:rgb(26, 26, 46);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:36px;font-weight:700;text-anchor:middle;dominant-baseline:auto">HAWKER DRONES</text>

